name: Tic-Tac-Toe Game

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  play:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'tictactoe:')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run Game Turn
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          TITLE="${{ github.event.issue.title }}"
          echo "Title: $TITLE"
          
          # Strip 'tictactoe:' prefix (case insensitive) and trim spaces
          CMD_STR=$(echo "$TITLE" | sed -E 's/^tictactoe:[[:space:]]*//i')
          echo "Command string: $CMD_STR"
          
          CMD=$(echo "$CMD_STR" | cut -d' ' -f1 | tr '[:upper:]' '[:lower:]')
          ARG=$(echo "$CMD_STR" | cut -d' ' -f2)
          echo "Parsed Command: $CMD, Argument: $ARG"
          
          if [ "$CMD" = "play" ]; then
            node scripts/tictactoe.js play "$ARG"
          elif [ "$CMD" = "reset" ]; then
            node scripts/tictactoe.js reset
          else
            echo "Unknown command: $CMD"
          fi

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "tictactoe: update game state [skip ci]"
          file_pattern: 'README.md data/tictactoe.json'

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            })
